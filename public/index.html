<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 블로그 다운로더</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>네이버 블로그 다운로더</h1>
      <p class="subtitle">블로그 글을 HTML / Markdown / Text로 다운로드</p>
    </header>

    <!-- 입력 섹션 -->
    <section id="inputSection" class="card">
      <label for="blogUrl">블로그 URL</label>
      <div class="input-row">
        <input
          type="text"
          id="blogUrl"
          placeholder="https://blog.naver.com/blogname"
          autocomplete="off"
        />
        <button id="fetchBtn" onclick="fetchPostList()">글 목록 가져오기</button>
      </div>
      <p id="errorMsg" class="error" style="display:none"></p>
    </section>

    <!-- 글 목록 섹션 -->
    <section id="postListSection" class="card" style="display:none">
      <div class="post-list-header">
        <h2>글 목록</h2>
        <span id="postCount" class="post-count"></span>
      </div>

      <!-- 선택 카운터 배지 -->
      <div id="selectionBadge" class="selection-badge">
        <span class="badge-icon">✓</span>
        <span id="selectionText">0개 선택 / 전체 0개</span>
      </div>

      <!-- 기간 필터 -->
      <div class="period-filter">
        <span class="period-label">기간:</span>
        <div class="period-buttons">
          <button class="period-btn" data-period="1w" onclick="selectByPeriod('1w')">1주</button>
          <button class="period-btn" data-period="2w" onclick="selectByPeriod('2w')">2주</button>
          <button class="period-btn" data-period="3w" onclick="selectByPeriod('3w')">3주</button>
          <button class="period-btn" data-period="1m" onclick="selectByPeriod('1m')">1달</button>
          <button class="period-btn active" data-period="2m" onclick="selectByPeriod('2m')">2달</button>
          <button class="period-btn" data-period="3m" onclick="selectByPeriod('3m')">3달</button>
          <button class="period-btn" data-period="4m" onclick="selectByPeriod('4m')">4달</button>
          <button class="period-btn" data-period="5m" onclick="selectByPeriod('5m')">5달</button>
          <button class="period-btn" data-period="6m" onclick="selectByPeriod('6m')">6개월</button>
        </div>
      </div>

      <div class="post-list-toolbar">
        <div class="toolbar-left">
          <button class="btn-sm" onclick="selectAll()">전체 선택</button>
          <button class="btn-sm btn-outline" onclick="deselectAll()">전체 해제</button>
        </div>
        <select id="formatSelect" title="형식">
          <option value="html" selected>HTML</option>
          <option value="md">Markdown</option>
          <option value="txt">Text</option>
        </select>
      </div>

      <div id="monthGroups" class="month-groups">
        <!-- JavaScript로 동적 생성 -->
      </div>

      <div class="post-list-footer">
        <button id="downloadBtn" onclick="startDownload()" disabled>
          선택한 글 다운로드 (0개)
        </button>
      </div>
    </section>

    <!-- 진행 상태 섹션 -->
    <section id="progressSection" class="card" style="display:none">
      <h2>진행 상태</h2>
      <div class="status-row">
        <span id="statusIcon" class="status-icon">⏳</span>
        <span id="statusText">준비 중...</span>
      </div>
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
      </div>
      <p id="progressDetail" class="detail"></p>
      <p id="currentPost" class="current-post"></p>
    </section>

    <!-- 결과 섹션 -->
    <section id="resultSection" class="card" style="display:none">
      <h2>완료!</h2>
      <div id="resultSummary" class="summary"></div>
      <a id="downloadLink" class="download-btn" href="#">ZIP 파일 다운로드</a>
      <div id="errorList" style="display:none">
        <h3>오류 목록</h3>
        <ul id="errorItems"></ul>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 주식회사 진솔컴퍼니. All rights reserved.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
